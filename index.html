<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YW傻鸟专属基地</title>
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&display=swap" rel="stylesheet">
    <style>
        /* 1. 宇宙深空背景 */
        body { 
            background: #050505; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            font-family: 'Long Cang', cursive;
        }

        /* 2. 背景画布层 */
        #universe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 3. 标题：带呼吸灯特效 */
        h1 {
            color: #ffeb3b;
            font-size: 3.5rem;
            text-align: center;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255, 235, 59, 0.8);
            user-select: none;
            pointer-events: none;
            line-height: 1.5;
        }

        /* 4. 核心爱心：脉冲心跳动画 */
        .heart-box {
            position: relative;
            width: 150px;
            height: 150px;
            z-index: 10;
            cursor: pointer;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        .heart {
            background-color: #f44336;
            width: 100px;
            height: 100px;
            position: absolute;
            transform: rotate(-45deg);
            box-shadow: 0 0 40px #f44336;
        }
        .heart::before, .heart::after {
            content: '';
            background-color: #f44336;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            position: absolute;
        }
        .heart::before { top: -50px; left: 0; }
        .heart::after { top: 0; left: 50px; }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <canvas id="universe"></canvas>
    
    <h1>我亲爱的大傻鸟，<br>想我的时候记得点一下这个大大的爱心</h1>
    
    <div class="heart-box" id="mainHeart">
        <div class="heart"></div>
    </div>

    <script>
        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');
        let w, h;

        // 设置画布大小
        function initSize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initSize);
        initSize();

        // --- 流星类 ---
        class Meteor {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * w * 1.5;
                this.y = -Math.random() * h;
                this.len = Math.random() * 80 + 50;
                this.speed = Math.random() * 10 + 5;
                this.color = `hsl(${Math.random() * 60 + 330}, 100%, 70%)`; // 偏红/粉
            }
            draw() {
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.len, this.y + this.len);
                ctx.stroke();
            }
            update() {
                this.x -= this.speed;
                this.y += this.speed;
                if (this.y > h + this.len || this.x < -this.len) {
                    this.reset();
                }
            }
        }

        // --- 点击粒子类 ---
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 4 + 2;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * 6 - 3;
                this.life = 1;
                this.color = `hsl(${Math.random() * 30 + 350}, 100%, 50%)`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.02;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        const meteors = Array.from({ length: 30 }, () => new Meteor());
        const particles = [];

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)'; // 拖尾效果
            ctx.fillRect(0, 0, w, h);

            meteors.forEach(m => {
                m.update();
                m.draw();
            });

            particles.forEach((p, index) => {
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(index, 1);
            });

            requestAnimationFrame(animate);
        }

        // 点击产生粒子效果
        document.getElementById('mainHeart').addEventListener('mousedown', (e) => {
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle(e.clientX, e.clientY));
            }
        });

        animate();
    </script>
</body>
</html>
