<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XG-Bro Legacy | 代码深空</title>
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&family=Source+Code+Pro&display=swap" rel="stylesheet">
    <style>
        :root { --heart-color: #ff4d6d; --accent-color: #ffeb3b; }
        body { background: #000; margin: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Long Cang', cursive; cursor: crosshair; }
        #universe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .content { z-index: 10; text-align: center; pointer-events: none; user-select: none; animation: fadeIn 3s ease-in; }
        h1 { color: var(--accent-color); font-size: 3.2rem; text-shadow: 0 0 20px rgba(255, 235, 59, 0.4); line-height: 1.6; margin-bottom: 40px; }
        .heart-box { position: relative; width: 120px; height: 120px; z-index: 10; cursor: pointer; pointer-events: auto; }
        .heart { background-color: var(--heart-color); width: 80px; height: 80px; position: absolute; transform: rotate(-45deg); box-shadow: 0 0 50px rgba(244, 67, 54, 0.8); animation: heartbeat 1.4s ease-in-out infinite; }
        .heart::before, .heart::after { content: ''; background-color: var(--heart-color); width: 80px; height: 80px; border-radius: 50%; position: absolute; }
        .heart::before { top: -40px; left: 0; }
        .heart::after { top: 0; left: 40px; }
        @keyframes heartbeat { 0% { transform: scale(1) rotate(-45deg); } 14% { transform: scale(1.15) rotate(-45deg); } 28% { transform: scale(1) rotate(-45deg); } 42% { transform: scale(1.15) rotate(-45deg); } 70% { transform: scale(1) rotate(-45deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <canvas id="universe"></canvas>
    <div class="content">
        <h1>我亲爱的大傻鸟，<br>想我的时候记得点一下这个大大的爱心</h1>
    </div>
    <div class="heart-box" id="mainHeart"><div class="heart"></div></div>

    <script>
        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');
        let w, h;
        // 专属情书内容
        const personalizedTexts = ["I Love YW", "文武009", "2026-04-08", "赛博情书", "YW专属", "Gemma 4"];

        function initSize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            ctx.font = '20px Source Code Pro';
            initDrops();
        }
        window.addEventListener('resize', initSize);

        // 数字雨滴类
        class Drop {
            constructor(x) { this.x = x; this.reset(); this.y = Math.random() * -100; }
            reset() { this.text = personalizedTexts[Math.floor(Math.random() * personalizedTexts.length)]; this.speed = Math.random() * 5 + 3; }
            draw() {
                ctx.fillStyle = `rgba(255, 77, 109, ${opacity})`;
                for (let i = 0; i < this.text.length; i++) {
                    ctx.fillText(this.text[i], this.x, this.y - i * 20);
                }
            }
            update() {
                if (isSwarming) { // 点击时的物理逻辑
                    this.y -= this.speed * 2; this.x += (Math.random()-0.5)*10;
                    if(this.y < -100) { this.reset(); this.y = h; this.x = Math.random()*w; }
                } else { this.y += this.speed; if (this.y - this.text.length * 20 > h) { this.y = Math.random() * -100; this.reset(); } }
            }
        }

        let drops = [], isSwarming = false, opacity = 1;

        function initDrops() {
            drops = [];
            for (let i = 0; i < w / 120; i++) drops.push(new Drop(i * 120));
        }
        initSize();

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; ctx.fillRect(0, 0, w, h);
            drops.forEach(d => { d.update(); d.draw(); });
            requestAnimationFrame(animate);
        }

        document.getElementById('mainHeart').addEventListener('click', (e) => {
            isSwarming = true; opacity = 0.5; // 点击崩散
            setTimeout(() => { isSwarming = false; opacity = 1; }, 2000); // 2秒后恢复
        });

        animate();
    </script>
</body>
</html>
