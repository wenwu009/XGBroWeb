<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YW专属惊喜基地</title>
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&display=swap" rel="stylesheet">
    <style>
        :root {
            --heart-red: #ff3860;
            --text-gold: #ffeb3b;
            --subtext-pink: #ff4d6d;
        }

        /* 1. 梦幻背景与全屏布局 */
        body { 
            background: radial-gradient(circle at center, #1a0f1f 0%, #0a0a0f 100%); /* 深紫色星空背景 */
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-around; 
            align-items: center; 
            height: 100vh;
            font-family: 'Long Cang', cursive;
            touch-action: none; /* 防止手机缩放干扰 */
        }

        /* 2. 全屏粒子画布 */
        #universe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 3. 文字内容：增加了发光层级 */
        .text-content {
            z-index: 10;
            text-align: center;
            width: 90%;
            pointer-events: none;
        }

        h1 {
            color: var(--text-gold);
            font-size: clamp(1.8rem, 8vw, 3rem);
            text-shadow: 0 0 20px rgba(255, 235, 59, 0.7);
            line-height: 1.6;
            margin: 0;
        }

        p.signature {
            color: var(--subtext-pink);
            font-size: 1.1rem;
            margin-top: 20px;
        }

        /* 4. 核心大爱心：心跳脉冲 */
        .heart-container {
            position: relative;
            width: 140px;
            height: 140px;
            z-index: 10;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .heart {
            background-color: var(--heart-red);
            width: 80px;
            height: 80px;
            position: absolute;
            transform: rotate(-45deg);
            box-shadow: 0 0 40px rgba(255, 56, 96, 0.8), inset 0 0 20px rgba(0,0,0,0.2);
            animation: heartbeat 1.5s ease-in-out infinite;
            position: relative; /* 为裂纹定位 */
        }
        .heart::before, .heart::after {
            content: '';
            background-color: var(--heart-red);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            position: absolute;
        }
        .heart::before { top: -40px; left: 0; }
        .heart::after { top: 0; left: 40px; }

        @keyframes heartbeat {
            0% { transform: scale(1) rotate(-45deg); }
            15% { transform: scale(1.15) rotate(-45deg); }
            30% { transform: scale(1) rotate(-45deg); }
            45% { transform: scale(1.1) rotate(-45deg); }
            100% { transform: scale(1) rotate(-45deg); }
        }

        /* 点击时的反馈 */
        .heart-container:active {
            transform: scale(0.85);
        }

        /* 裂纹样式 */
        .crack {
            position: absolute;
            background-color: #000; /* 裂纹颜色，黑色或深色 */
            transition: opacity 0.2s, transform 0.2s;
            opacity: 0; /* 默认不可见 */
        }
        /* 设计4个裂纹线条，从中心向外延伸 */
        .crack1 { width: 100%; height: 2px; top: 50%; left: 0; transform: translateY(-50%) skewX(45deg); }
        .crack2 { width: 2px; height: 100%; top: 0; left: 50%; transform: translateX(-50%) skewY(45deg); }
        .crack3 { width: 80%; height: 1px; top: 60%; left: 10%; transform: rotate(10deg); }
        .crack4 { width: 70%; height: 1px; top: 40%; left: 20%; transform: rotate(-10deg); }


        /* 5. 底部版权与提示 */
        .footer {
            z-index: 10;
            color: rgba(255, 77, 109, 0.6);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <canvas id="universe"></canvas>
    
    <div class="text-content">
        <h1>我亲爱的大傻鸟，<br>想我的时候记得点一下这个大大的爱心</h1>
        <p class="signature">文武009 专属定制</p>
    }
    
    <div class="heart-container" id="mainHeart">
        <div class="heart">
            <div class="crack crack1"></div>
            <div class="crack crack2"></div>
            <div class="crack crack3"></div>
            <div class="crack crack4"></div>
        </div>
    </div>

    <div class="footer">TOUCH THE HEART</div>

    <script>
        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');
        let w, h, dpr;
        let petals = [], stars = [];

        // 初始化画布和静态星星
        function initCanvas() {
            dpr = window.devicePixelRatio || 1;
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            ctx.scale(dpr, dpr);
            stars = [];
            // 初始化静态星尘背景
            for(let i=0; i<150; i++) {
                stars.push({
                    x: Math.random() * w, y: Math.random() * h,
                    size: Math.random() * 1.5,
                    blink: Math.random() * 0.05, opacity: Math.random()
                });
            }
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        // 真正的粒子樱花瓣类
        class Petal {
            constructor() { this.reset(); this.y = Math.random() * h; /* 初始分布全屏 */ }
            reset() {
                this.x = Math.random() * w; this.y = -50;
                this.size = Math.random() * 10 + 6;
                this.speedY = Math.random() * 1.5 + 1; // 慢慢下落
                this.speedX = Math.random() * 1 - 0.5; // 轻微摆动
                this.rotation = Math.random() * 360; this.rotationSpeed = (Math.random()-0.5)*2;
                this.opacity = Math.random() * 0.5 + 0.5;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.opacity; ctx.translate(this.x, this.y); ctx.rotate(this.rotation * Math.PI / 180);
                // 绘制豆瓣形状（模拟花瓣）
                const grad = ctx.createLinearGradient(0, 0, this.size, this.size);
                grad.addColorStop(0, '#ffc0cb'); grad.addColorStop(1, '#ff69b4');
                ctx.fillStyle = grad; ctx.beginPath();
                const d = this.size;
                ctx.moveTo(0, d/2); ctx.bezierCurveTo(-d/2, -d/2, -d, d/3, 0, d); ctx.bezierCurveTo(d, d/3, d/2, -d/2, 0, d/2); ctx.fill(); ctx.restore();
            }
            update() {
                this.y += this.speedY; this.x += this.speedX + Math.sin(this.y * 0.02) * 0.5; this.rotation += this.rotationSpeed;
                if (this.y > h + 50) this.reset();
            }
        }

        // 点击产生的粒子小爱心
        class PopHeart {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 10 + 5;
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15;
                this.life = 1; // 初始生命
                const colors = ['#ff4b4b', '#ff7eb3', '#f44336'];
                this.color = colors[Math.floor(Math.random()*colors.length)];
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color; ctx.beginPath();
                // 绘制小爱心形状
                const d = this.size;
                ctx.moveTo(0, d/2); ctx.bezierCurveTo(-d/2, -d/2, -d, d/3, 0, d); ctx.bezierCurveTo(d, d/3, d/2, -d/2, 0, d/2); ctx.fill(); ctx.restore();
            }
            update() {
                this.x += this.vx; this.y += this.vy; this.vy += 0.5; // 重力
                this.vx *= 0.98; // 空气阻力
                this.life -= 0.03; // 淡出
            }
        }

        // 浮动文本类
        const TEXT_MESSAGES = ["不要再点啦", "不要点啦", "再点要碎啦"];
        class FloatingText {
            constructor() {
                this.x = Math.random() * (w - 200) + 100; // 避免太靠边
                this.y = Math.random() * (h - 100) + 50;  // 避免太靠顶/底
                this.text = TEXT_MESSAGES[Math.floor(Math.random() * TEXT_MESSAGES.length)];
                this.life = 1; // 生命 1.0 -> 0.0
                this.speed = Math.random() * 0.5 + 0.5; // 向上浮动速度
                this.vx = (Math.random() - 0.5) * 1;    // 左右摆动
                // 获取 CSS 变量值
                this.color = getComputedStyle(document.documentElement).getPropertyValue('--subtext-pink').trim();
                this.size = Math.random() * 15 + 20; // 字体大小 20-35px
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.translate(this.x, this.y);
                ctx.fillStyle = this.color;
                ctx.font = `${this.size}px 'Long Cang', cursive`;
                ctx.textAlign = 'center';
                ctx.fillText(this.text, 0, 0);
                ctx.restore();
            }
            update() {
                this.y -= this.speed; // 向上浮动
                this.x += this.vx;
                this.life -= 0.01; // 淡出
            }
        }


        const petalsData = [], popHeartsData = [], floatingTextsData = [];
        for (let i = 0; i < 60; i++) petalsData.push(new Petal());

        function animate() {
            // 背景清理并加色拖尾（营造一点梦幻感）
            ctx.fillStyle = 'rgba(26, 15, 31, 0.2)';
            ctx.fillRect(0, 0, w, h);
            // 画群星
            stars.forEach(s => {
                s.opacity += s.blink; if(s.opacity > 1 || s.opacity < 0) s.blink *= -1;
                ctx.fillStyle = `rgba(255, 235, 59, ${Math.max(0, s.opacity)})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
            });
            // 画樱花
            petalsData.forEach(p => { p.update(); p.draw(); });
            // 画爆炸爱心
            popHeartsData.forEach((p, i) => { p.update(); p.draw(); if(p.life <= 0) popHeartsData.splice(i, 1); });
            // 画浮动文字
            floatingTextsData.forEach((ft, i) => { ft.update(); ft.draw(); if (ft.life <= 0) floatingTextsData.splice(i, 1); });

            requestAnimationFrame(animate);
        }

        const mainHeart = document.getElementById('mainHeart');
        const cracks = document.querySelectorAll('.crack');

        // 全局状态变量
        let isHolding = false;
        let crackLevel = 0; // 0.0 -> 1.0 (最大裂纹)
        const MAX_CRACK = 1.0;
        const CRACK_INCREMENT = 0.03; // 每次增加
        const HEAL_INCREMENT = 0.01;  // 每次愈合
        let crackIntervalId = null;
        let healIntervalId = null;

        // 更新裂纹 DOM 样式的函数
        function updateCrackStyle() {
            cracks.forEach(c => {
                if (crackLevel > 0.05) { // 有一点裂纹后才显示
                    c.style.opacity = crackLevel; // opacity 与裂纹程度正相关
                } else {
                    c.style.opacity = 0;
                }
            });
        }

        // 裂纹增加逻辑
        function startCracking() {
            if (crackLevel < MAX_CRACK) {
                crackLevel += CRACK_INCREMENT;
                updateCrackStyle();
            } else {
                // 达到最大裂纹，停止增加
                if (crackIntervalId) clearInterval(crackIntervalId);
            }
        }

        // 愈合逻辑
        function startHealing() {
            if (crackLevel > 0) {
                crackLevel -= HEAL_INCREMENT;
                if (crackLevel < 0) crackLevel = 0;
                updateCrackStyle();
            } else {
                // 愈合完成
                if (healIntervalId) clearInterval(healIntervalId);
            }
        }


        // 处理点击/长按逻辑
        function handlePointerDown(e) {
            isHolding = true;

            // 1. 原有爆炸效果逻辑 (点击瞬间触发)
            let x = e.clientX || (e.touches && e.touches[0].clientX);
            let y = e.clientY || (e.touches && e.touches[0].clientY);
            if (x && y) {
                for(let i=0; i<15; i++) popHeartsData.push(new PopHeart(x, y));
            }

            // 2. 裂纹增加逻辑
            if (healIntervalId) clearInterval(healIntervalId); // 停止愈合
            if (crackIntervalId) clearInterval(crackIntervalId); // 防止重复启动
            crackIntervalId = setInterval(startCracking, 100); // 每 100ms 增加一次裂纹

            // 3. 浮动文本逻辑
            // 点击或长按都生成一条文本
            floatingTextsData.push(new FloatingText());
        }

        function handlePointerUp() {
            if (isHolding) {
                isHolding = false;
                // 1. 停止裂纹增加
                if (crackIntervalId) clearInterval(crackIntervalId);
                // 2. 启动愈合逻辑
                if (healIntervalId) clearInterval(healIntervalId); // 防止重复启动
                healIntervalId = setInterval(startHealing, 100); // 每 100ms 愈合一次
            }
        }

        // 添加事件监听器 (同时支持鼠标和触摸)
        mainHeart.addEventListener('mousedown', handlePointerDown);
        window.addEventListener('mouseup', handlePointerUp); // 在窗口松开也有效
        mainHeart.addEventListener('touchstart', (e) => { e.preventDefault(); handlePointerDown(e); }); // 防止默认触摸行为
        window.addEventListener('touchend', handlePointerUp);

        animate();
    </script>
</body>
</html>
