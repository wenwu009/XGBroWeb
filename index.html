<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XG-BRO | 赛博智能核心</title>
    <style>
        /* 整体赛博黑客风格设置 */
        body {
            background-color: #0a0a0a; /* 极客黑 */
            color: #00ff41; /* 经典矩阵绿 */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #terminal {
            width: 80%;
            max-width: 800px;
            height: 60vh;
            border: 2px solid #00ff41;
            padding: 20px;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 15px #00ff41;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .line { margin-bottom: 10px; line-height: 1.4; }
        .user-prompt { color: #008f11; font-weight: bold; }
        .bot-response { color: #00ff41; text-shadow: 0 0 5px #00ff41; }

        .input-area {
            display: flex;
            width: 80%;
            max-width: 800px;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            background: black;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 10px;
            outline: none;
            font-family: inherit;
        }

        button {
            background: #00ff41;
            color: black;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #008f11;
            color: #fff;
        }

        /* 简单的滚动条美化 */
        #terminal::-webkit-scrollbar { width: 5px; }
        #terminal::-webkit-scrollbar-thumb { background: #008f11; }
    </style>
</head>
<body>

    <h1 style="text-shadow: 0 0 10px #00ff41;">[ XG-BRO CYBERNETIC CORE ]</h1>
    
    <div id="terminal">
        <div class="line bot-response">>> 系统就绪... 正在连接 5070 炼丹炉...</div>
        <div class="line bot-response">>> 当前节点: 缅甸·妙瓦底</div>
        <div class="line bot-response">>> 状态: 12092个语料文件正在加载中...</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="输入你的渗透/逆向指令..." onkeydown="if(event.keyCode==13) sendMessage()">
        <button onclick="sendMessage()">发送</button>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const userInput = document.getElementById('userInput');

        function appendMessage(text, isUser = false) {
            const line = document.createElement('div');
            line.className = 'line ' + (isUser ? 'user-prompt' : 'bot-response');
            line.innerText = (isUser ? 'X哥 > ' : 'SYSTEM >> ') + text;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, true);
            userInput.value = '';

            // 这是一个占位逻辑，明天等你的 API 调通了，就接在这里
            setTimeout(() => {
                appendMessage("正在呼叫 XG-Gemma-4 核心进行深度解析...");
                setTimeout(() => {
                    appendMessage("错误: 5070 核心正在闭关修炼（当前进度 1%），请明天早上 9:00 再试。");
                }, 1000);
            }, 500);
        }
    </script>
</body>
</html>
