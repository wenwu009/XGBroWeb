<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YW傻鸟专属基地</title>
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #020205; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            font-family: 'Long Cang', cursive;
        }

        #universe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        h1 {
            color: #ffeb3b;
            font-size: 3.5rem;
            text-align: center;
            z-index: 10;
            text-shadow: 0 0 15px rgba(255, 235, 59, 0.6);
            user-select: none;
            pointer-events: none;
            line-height: 1.6;
        }

        /* 核心爱心：增加了发光层级 */
        .heart-box {
            position: relative;
            width: 150px;
            height: 150px;
            z-index: 10;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .heart {
            background-color: #f44336;
            width: 100px;
            height: 100px;
            position: absolute;
            transform: rotate(-45deg);
            box-shadow: 0 0 50px rgba(244, 67, 54, 0.8);
            pointer-events: none;
        }
        .heart::before, .heart::after {
            content: '';
            background-color: #f44336;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            position: absolute;
        }
        .heart::before { top: -50px; left: 0; }
        .heart::after { top: 0; left: 50px; }

        /* 点击时的缩放反馈 */
        .heart-box:active {
            transform: scale(0.85);
        }

        /* 自动呼吸效果 */
        @keyframes heartPulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .heart-active {
            animation: heartPulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <canvas id="universe"></canvas>
    
    <h1>我亲爱的大傻鸟，<br>想我的时候记得点一下这个大大的爱心</h1>
    
    <div class="heart-box heart-active" id="mainHeart">
        <div class="heart"></div>
    </div>

    <script>
        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');
        let w, h;
        let meteors = [];
        let shockwaves = [];
        let sparks = [];
        let stars = [];

        function initSize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            // 初始化静态星星
            stars = [];
            for(let i=0; i<150; i++) {
                stars.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: Math.random() * 1.5,
                    opacity: Math.random()
                });
            }
        }
        window.addEventListener('resize', initSize);
        initSize();

        // 高级感流星类
        class Meteor {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w;
                this.y = -200;
                this.len = Math.random() * 150 + 100;
                this.speed = Math.random() * 15 + 10;
                this.color = ["#ffeb3b", "#ff4b4b", "#fff"][Math.floor(Math.random()*3)];
            }
            draw() {
                const gradient = ctx.createLinearGradient(this.x, this.y, this.x + this.len, this.y - this.len);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 1.2;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.len, this.y - this.len);
                ctx.stroke();
            }
            update() {
                this.x -= this.speed;
                this.y += this.speed;
                if (this.y > h + 200 || this.x < -200) this.reset();
            }
        }

        // 点击产生的冲击波类
        class Shockwave {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.r = 10;
                this.opacity = 1;
            }
            draw() {
                ctx.strokeStyle = `rgba(255, 235, 59, ${this.opacity})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.stroke();
            }
            update() {
                this.r += 12;
                this.opacity -= 0.02;
            }
        }

        // 细碎的魔法火花
        class Spark {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15;
                this.size = Math.random() * 3;
                this.life = 1;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.life})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.95;
                this.vy *= 0.95;
                this.life -= 0.03;
            }
        }

        for (let i = 0; i < 8; i++) meteors.push(new Meteor());

        function animate() {
            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, w, h);

            // 画背景星尘
            stars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // 绘制流星
            meteors.forEach(m => { m.update(); m.draw(); });

            // 绘制冲击波
            shockwaves.forEach((sw, i) => {
                sw.update(); sw.draw();
                if (sw.opacity <= 0) shockwaves.splice(i, 1);
            });

            // 绘制火花
            sparks.forEach((sp, i) => {
                sp.update(); sp.draw();
                if (sp.life <= 0) sparks.splice(i, 1);
            });

            requestAnimationFrame(animate);
        }

        document.getElementById('mainHeart').addEventListener('click', (e) => {
            // 产生冲击波
            shockwaves.push(new Shockwave(e.clientX, e.clientY));
            // 产生魔法火花
            for(let i=0; i<20; i++) sparks.push(new Spark(e.clientX, e.clientY));
        });

        animate();
    </script>
</body>
</html>
