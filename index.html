<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YW专属基地</title>
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0f; /* 深邃纯净的背景 */
            overflow: hidden;
            font-family: 'Long Cang', cursive;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 保证居中 */
            touch-action: none;
        }

        /* 标题排版 */
        .title-box {
            text-align: center;
            margin-bottom: 60px; /* 和爱心保持完美距离 */
            z-index: 10;
        }

        h1 {
            color: #ffeb3b;
            font-size: clamp(1.8rem, 8vw, 2.5rem);
            text-shadow: 0 0 15px rgba(255, 235, 59, 0.6);
            line-height: 1.5;
            margin: 0;
            padding: 0 20px;
        }

        /* 核心大爱心 */
        .big-heart-btn {
            position: relative;
            width: 100px;
            height: 100px;
            z-index: 10;
            cursor: pointer;
            /* 呼吸跳动动画 */
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        /* 纯 CSS 画的大爱心 */
        .heart-shape {
            background-color: #ff3860;
            width: 60px;
            height: 60px;
            position: absolute;
            top: 20px;
            left: 20px;
            transform: rotate(-45deg);
            box-shadow: 0 0 40px rgba(255, 56, 96, 0.8);
            pointer-events: none; /* 让点击穿透到父元素 */
        }

        .heart-shape::before, .heart-shape::after {
            content: '';
            background-color: #ff3860;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            position: absolute;
        }
        .heart-shape::before { top: -30px; left: 0; }
        .heart-shape::after { top: 0; left: 30px; }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* 飞出来的小爱心动画 */
        .little-heart {
            position: absolute;
            pointer-events: none; /* 不干扰点击 */
            z-index: 5;
            /* 使用 CSS 变量控制随机飞行的方向 */
            animation: flyOut 1s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            text-shadow: 0 0 10px currentColor;
        }

        @keyframes flyOut {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.5) rotate(var(--rot));
            }
        }
    </style>
</head>
<body>

    <div class="title-box">
        <h1>我亲爱的大傻鸟，<br>想我的时候记得点一下这个大大的爱心</h1>
    </div>
    
    <div class="big-heart-btn" id="heartBtn">
        <div class="heart-shape"></div>
    </div>

    <script>
        const btn = document.getElementById('heartBtn');

        // 生成爆开的小爱心
        function createPopHearts(x, y) {
            // 每次点击弹出 12 个小爱心
            for (let i = 0; i < 12; i++) {
                const littleHeart = document.createElement('div');
                littleHeart.innerHTML = '❤'; // 直接用爱心符号，最清晰且不卡顿
                littleHeart.className = 'little-heart';
                
                // 设置起始位置在手指点击的地方
                littleHeart.style.left = x + 'px';
                littleHeart.style.top = y + 'px';

                // 随机生成飞散的角度和距离
                const angle = Math.random() * Math.PI * 2; // 360度随机
                const velocity = 60 + Math.random() * 100; // 飞行的距离
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                const rot = (Math.random() - 0.5) * 120; // 随机旋转角度

                // 把随机值传给 CSS 动画
                littleHeart.style.setProperty('--tx', `${tx}px`);
                littleHeart.style.setProperty('--ty', `${ty}px`);
                littleHeart.style.setProperty('--rot', `${rot}deg`);

                // 随机爱心颜色和大小
                const colors = ['#ff3860', '#ff7eb3', '#ff4d6d', '#ffeb3b'];
                littleHeart.style.color = colors[Math.floor(Math.random() * colors.length)];
                littleHeart.style.fontSize = (16 + Math.random() * 15) + 'px';

                document.body.appendChild(littleHeart);

                // 动画结束（1秒）后，把元素从页面删掉，防止手机卡顿
                setTimeout(() => {
                    littleHeart.remove();
                }, 1000);
            }
        }

        // 交互事件
        const trigger = (e) => {
            e.preventDefault(); 
            // 获取点击/触摸的精确坐标
            let touchX, touchY;
            if (e.touches && e.touches.length > 0) {
                touchX = e.touches[0].clientX;
                touchY = e.touches[0].clientY;
            } else {
                touchX = e.clientX;
                touchY = e.clientY;
            }
            
            // 按钮本身瞬间缩小的反馈
            btn.style.transform = 'scale(0.85)';
            setTimeout(() => { btn.style.transform = 'scale(1)'; }, 150);

            // 触发爆开特效
            createPopHearts(touchX, touchY);
        };

        // 同时绑定手机触屏和电脑鼠标点击
        btn.addEventListener('touchstart', trigger, {passive: false});
        btn.addEventListener('mousedown', trigger);
    </script>
</body>
</html>
