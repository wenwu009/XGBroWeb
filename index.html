<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XG-Bro Legacy | 引力奇点</title>
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&display=swap" rel="stylesheet">
    <style>
        :root { --heart-color: #f44336; --accent-color: #ffeb3b; }
        body { background: #010103; margin: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Long Cang', cursive; cursor: crosshair; }
        #universe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .content { z-index: 10; text-align: center; pointer-events: none; user-select: none; animation: fadeIn 3s ease-in; }
        h1 { color: var(--accent-color); font-size: 3.2rem; text-shadow: 0 0 20px rgba(255, 235, 59, 0.4); line-height: 1.6; margin-bottom: 40px; }
        .heart-box { position: relative; width: 120px; height: 120px; z-index: 10; cursor: pointer; pointer-events: auto; }
        .heart { background-color: var(--heart-color); width: 80px; height: 80px; position: absolute; transform: rotate(-45deg); box-shadow: 0 0 50px rgba(244, 67, 54, 0.8); animation: heartbeat 1.4s ease-in-out infinite; }
        .heart::before, .heart::after { content: ''; background-color: var(--heart-color); width: 80px; height: 80px; border-radius: 50%; position: absolute; }
        .heart::before { top: -40px; left: 0; }
        .heart::after { top: 0; left: 40px; }
        @keyframes heartbeat { 0% { transform: scale(1) rotate(-45deg); } 14% { transform: scale(1.15) rotate(-45deg); } 28% { transform: scale(1) rotate(-45deg); } 42% { transform: scale(1.15) rotate(-45deg); } 70% { transform: scale(1) rotate(-45deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <canvas id="universe"></canvas>
    <div class="content">
        <h1>我亲爱的大傻鸟，<br>想我的时候记得点一下这个大大的爱心</h1>
    </div>
    <div class="heart-box" id="mainHeart"><div class="heart"></div></div>

    <script>
        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');
        let w, h, target;
        let particles = [];

        function initSize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            target = { x: w / 2, y: h / 2 };
            particles = [];
            for (let i = 0; i < 400; i++) particles.push(new Particle());
        }
        window.addEventListener('resize', initSize);
        initSize();

        // 引力粒子类
        class Particle {
            constructor() {
                this.x = Math.random() * w; this.y = Math.random() * h;
                this.originX = Math.random() * w; this.originY = Math.random() * h;
                this.vx = 0; this.vy = 0;
                this.accX = 0; this.accY = 0;
                this.friction = Math.random() * 0.05 + 0.94;
                this.color = `rgba(255, ${Math.random()*100+155}, ${Math.random()*50+205}, ${Math.random()})`;
                this.repulsionFactor = Math.random() * 50 + 20;
            }
            draw() {
                ctx.fillStyle = this.color; ctx.beginPath();
                ctx.arc(this.x, this.y, 1.2, 0, Math.PI * 2); ctx.fill();
            }
            update() {
                // 万有引力核心物理逻辑
                const dx = target.x - this.x, dy = target.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const force = (distance - 150) / 150;
                this.accX = dx / distance * force * repulsion;
                this.accY = dy / distance * force * repulsion;
                this.vx += this.accX; this.vy += this.accY;
                this.vx *= this.friction; this.vy *= this.friction;
                this.x += this.vx; this.y += this.vy;
            }
        }

        let repulsion = 1; // 默认吸引，点击时改为排斥

        function animate() {
            ctx.fillStyle = 'rgba(1, 1, 3, 0.3)'; ctx.fillRect(0, 0, w, h);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        document.getElementById('mainHeart').addEventListener('click', (e) => {
            repulsion = -8; // 瞬间变为强排斥，产生震散效果
            setTimeout(() => repulsion = 1, 1000); // 1秒后吸回
        });

        animate();
    </script>
</body>
</html>
