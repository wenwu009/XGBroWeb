<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XG-Bro | 专属梦幻星空</title>
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&display=swap" rel="stylesheet">
    <style>
        :root {
            --heart-color: #ff4d6d;
            --accent-color: #ffeb3b;
        }

        body { 
            background: #05050a; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            font-family: 'Long Cang', cursive;
            cursor: crosshair;
        }

        #universe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 标题：增加渐显效果 */
        .content {
            z-index: 10;
            text-align: center;
            pointer-events: none;
            user-select: none;
            animation: fadeIn 3s ease-in;
        }

        h1 {
            color: var(--accent-color);
            font-size: 3.2rem;
            text-shadow: 0 0 20px rgba(255, 235, 59, 0.4);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* 核心爱心：双层外发光 */
        .heart-box {
            position: relative;
            width: 120px;
            height: 120px;
            z-index: 10;
            cursor: pointer;
            pointer-events: auto;
        }

        .heart {
            background-color: var(--heart-color);
            width: 80px;
            height: 80px;
            position: absolute;
            transform: rotate(-45deg);
            box-shadow: 0 0 40px rgba(255, 77, 109, 0.6);
            animation: heartbeat 1.4s ease-in-out infinite;
        }

        .heart::before, .heart::after {
            content: '';
            background-color: var(--heart-color);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            position: absolute;
        }
        .heart::before { top: -40px; left: 0; }
        .heart::after { top: 0; left: 40px; }

        @keyframes heartbeat {
            0% { transform: scale(1) rotate(-45deg); filter: brightness(1); }
            14% { transform: scale(1.15) rotate(-45deg); filter: brightness(1.2); }
            28% { transform: scale(1) rotate(-45deg); }
            42% { transform: scale(1.15) rotate(-45deg); }
            70% { transform: scale(1) rotate(-45deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 手机端适配 */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <canvas id="universe"></canvas>
    
    <div class="content">
        <h1>我亲爱的大傻鸟，<br>想我的时候记得点一下这个大大的爱心</h1>
    </div>
    
    <div class="heart-box" id="mainHeart">
        <div class="heart"></div>
    </div>

    <script>
        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');
        let w, h;
        let meteors = [], stars = [], particles = [];

        function initSize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            stars = [];
            // 生成星星
            for(let i=0; i<200; i++) {
                stars.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: Math.random() * 1.5,
                    blink: Math.random() * 0.05,
                    opacity: Math.random()
                });
            }
        }
        window.addEventListener('resize', initSize);
        initSize();

        // 幻彩流星类
        class Meteor {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w;
                this.y = -Math.random() * h;
                this.len = Math.random() * 100 + 150;
                this.speed = Math.random() * 10 + 6;
                this.color = ["#ffeb3b", "#ff758c", "#a29bfe"][Math.floor(Math.random()*3)];
            }
            draw() {
                ctx.save();
                const grad = ctx.createLinearGradient(this.x, this.y, this.x + this.len, this.y - this.len);
                grad.addColorStop(0, this.color);
                grad.addColorStop(1, 'transparent');
                ctx.strokeStyle = grad;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.len, this.y - this.len);
                ctx.stroke();
                ctx.restore();
            }
            update() {
                this.x -= this.speed;
                this.y += this.speed;
                if (this.y > h + 200 || this.x < -200) this.reset();
            }
        }

        // 飞散的爱心粒子类
        class HeartParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 10 + 5;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.opacity = 1;
                this.rot = Math.random() * 360;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rot * Math.PI / 180);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#ff4d6d';
                ctx.beginPath();
                // 绘制一个小爱心
                const d = this.size;
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-d/2, -d/2, -d, d/3, 0, d);
                ctx.bezierCurveTo(d, d/3, d/2, -d/2, 0, 0);
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.opacity -= 0.015;
                this.rot += 2;
            }
        }

        for (let i = 0; i < 6; i++) meteors.push(new Meteor());

        function animate() {
            // 营造拖尾背景
            ctx.fillStyle = 'rgba(5, 5, 15, 0.25)';
            ctx.fillRect(0, 0, w, h);

            // 画闪烁的星星
            stars.forEach(s => {
                s.opacity += s.blink;
                if(s.opacity > 1 || s.opacity < 0) s.blink *= -1;
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, s.opacity)})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // 画流星
            meteors.forEach(m => { m.update(); m.draw(); });

            // 画点击散开的爱心
            particles.forEach((p, i) => {
                p.update();
                p.draw();
                if(p.opacity <= 0) particles.splice(i, 1);
            });

            requestAnimationFrame(animate);
        }

        document.getElementById('mainHeart').addEventListener('click', (e) => {
            // 点击震散出一堆小爱心
            for(let i=0; i<18; i++) {
                particles.push(new HeartParticle(e.clientX, e.clientY));
            }
        });

        animate();
    </script>
</body>
</html>
