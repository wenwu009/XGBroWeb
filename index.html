<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YW的专属星空</title>
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&display=swap" rel="stylesheet">
    <style>
        :root {
            --heart-red: #ff4d6d;
            --star-gold: #ffeb3b;
        }

        /* 使用 svh 适配移动端动态高度 */
        body { 
            background: #020205; 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-around; 
            align-items: center; 
            height: 100vh;
            height: 100svh; 
            font-family: 'Long Cang', cursive;
            touch-action: none; /* 防止手机缩放干扰 */
        }

        #universe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .text-content {
            z-index: 10;
            text-align: center;
            width: 90%; /* 保证手机端不溢出 */
            pointer-events: none;
        }

        /* 手机端动态字号 */
        h1 {
            color: var(--star-gold);
            font-size: clamp(1.5rem, 8vw, 2.5rem);
            text-shadow: 0 0 15px rgba(255, 235, 59, 0.5);
            line-height: 1.5;
            margin: 0;
        }

        .heart-container {
            position: relative;
            width: 120px;
            height: 120px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 脉冲爱心 */
        .heart {
            background-color: var(--heart-red);
            width: 60px;
            height: 60px;
            position: relative;
            transform: rotate(-45deg);
            box-shadow: 0 0 40px rgba(255, 77, 109, 0.8);
            animation: pulse 1.5s ease-in-out infinite;
        }
        .heart::before, .heart::after {
            content: '';
            background-color: var(--heart-red);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            position: absolute;
        }
        .heart::before { top: -30px; left: 0; }
        .heart::after { top: 0; left: 30px; }

        @keyframes pulse {
            0% { transform: scale(1) rotate(-45deg); }
            15% { transform: scale(1.15) rotate(-45deg); }
            30% { transform: scale(1) rotate(-45deg); }
            45% { transform: scale(1.15) rotate(-45deg); }
            100% { transform: scale(1) rotate(-45deg); }
        }

        /* 底部版权小字，更像个正式页面 */
        .footer {
            z-index: 10;
            color: rgba(255, 235, 59, 0.4);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <canvas id="universe"></canvas>
    
    <div class="text-content">
        <h1>我亲爱的大傻鸟，<br>想我的时候记得点一下这个大大的爱心</h1>
    </div>
    
    <div class="heart-container" id="heartTrigger">
        <div class="heart"></div>
    </div>

    <div class="footer">// From: 文武009</div>

    <script>
        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');
        let w, h, dpr;
        let particles = [];

        // 针对手机高分屏优化：逻辑像素 vs 物理像素
        function initCanvas() {
            dpr = window.devicePixelRatio || 1;
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            ctx.scale(dpr, dpr);
            
            particles = [];
            for (let i = 0; i < 260; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: 0, vy: 0,
                    size: Math.random() * 1.5 + 0.5,
                    color: `hsla(${Math.random() * 20 + 340}, 100%, 70%, ${Math.random() * 0.8 + 0.2})`
                });
            }
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();

        let force = 0.15; // 默认吸引力
        let centerX = w / 2;
        let centerY = h / 2;

        function animate() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.2)';
            ctx.fillRect(0, 0, w, h);

            particles.forEach(p => {
                const dx = centerX - p.x;
                const dy = centerY - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // 吸引力物理模型
                const acc = (dist - 80) * force * 0.01;
                p.vx += (dx / dist) * acc;
                p.vy += (dy / dist) * acc;

                p.vx *= 0.96; // 阻尼
                p.vy *= 0.96;
                p.x += p.vx;
                p.y += p.vy;

                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(animate);
        }

        const trigger = document.getElementById('heartTrigger');

        // 手机触控优化
        const handleInteraction = (e) => {
            const touch = e.touches ? e.touches[0] : e;
            centerX = touch.clientX;
            centerY = touch.clientY;
            
            force = -2.5; // 瞬间变成强排斥力（震散效果）
            setTimeout(() => {
                force = 0.15; // 恢复吸引
                centerX = w / 2;
                centerY = h / 2;
            }, 800);
        };

        trigger.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInteraction(e);
        });
        trigger.addEventListener('mousedown', handleInteraction);

        animate();
    </script>
</body>
</html>
