<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YW傻鸟专属</title>
    <style>
        body { background-color: #121212; color: #ffeb3b; font-family: 'Long Cang', cursive; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        h1 { font-size: 3.5em; text-align: center; line-height: 1.4; text-shadow: 0 0 10px #ffeb3b; margin-bottom: 50px; }
        .heart-container { position: relative; width: 200px; height: 200px; cursor: pointer; transition: transform 0.2s; }
        .heart-container:hover { transform: scale(1.1); }
        .heart { background-color: #f44336; width: 100px; height: 100px; position: absolute; top: 50px; left: 50px; transform: rotate(-45deg); box-shadow: 0 0 20px #f44336; }
        .heart::before, .heart::after { content: ''; background-color: #f44336; width: 100px; height: 100px; border-radius: 50%; position: absolute; }
        .heart::before { top: -50px; left: 0; }
        .heart::after { top: 0; left: 50px; }

        /* 点击特效 */
        .spark { position: absolute; width: 10px; height: 10px; background-color: #ff9800; border-radius: 50%; opacity: 0; pointer-events: none; }
        @keyframes sparkle {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(4) translate(var(--tw-translate-x), var(--tw-translate-y)); opacity: 0; }
        }
    </style>
</head>
<body>
    <h1>我亲爱的大傻鸟，<br>想我的时候记得点一下这个大大的爱心</h1>
    <div class="heart-container" onclick="createSparkles(event)">
        <div class="heart"></div>
    </div>

    <script>
        function createSparkles(event) {
            const container = document.querySelector('.heart-container');
            const rect = container.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            for (let i = 0; i < 15; i++) {
                const spark = document.createElement('div');
                spark.classList.add('spark');
                spark.style.left = x + 'px';
                spark.style.top = y + 'px';
                
                // 随机方向和颜色
                const colors = ['#ff9800', '#ffeb3b', '#f44336', '#e91e63'];
                spark.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // CSS 变量实现随机偏移
                spark.style.setProperty('--tw-translate-x', (Math.random() * 200 - 100) + 'px');
                spark.style.setProperty('--tw-translate-y', (Math.random() * 200 - 100) + 'px');
                
                spark.style.animation = 'sparkle 0.8s ease-out forwards';
                container.appendChild(spark);
                
                // 动画结束后移除元素
                setTimeout(() => {
                    spark.remove();
                }, 800);
            }
        }
    </script>
</body>
</html>
