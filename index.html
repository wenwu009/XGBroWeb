<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YW傻鸟专属基地</title>
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&display=swap" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffeb3b; font-family: 'Long Cang', cursive; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        h1 { font-size: 3.5em; text-align: center; line-height: 1.4; text-shadow: 0 0 10px #ffeb3b; margin-bottom: 50px; }
        p { color: #f44336; font-size: 1.2rem; margin-top: -30px; margin-bottom: 50px; text-shadow: 0 0 5px rgba(244, 67, 54, 0.4); }
        .heart-container { position: relative; width: 200px; height: 200px; cursor: pointer; transition: transform 0.2s; }
        .heart-container:hover { transform: scale(1.1); }
        .heart { background-color: #f44336; width: 100px; height: 100px; position: absolute; top: 50px; left: 50px; transform: rotate(-45deg); box-shadow: 0 0 20px #f44336, 0 0 40px rgba(244, 67, 54, 0.5); }
        .heart::before, .heart::after { content: ''; background-color: #f44336; width: 100px; height: 100px; border-radius: 50%; position: absolute; }
        .heart::before { top: -50px; left: 0; }
        .heart::after { top: 0; left: 50px; }
        @keyframes heartbeat { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .heart-active { animation: heartbeat 1.5s ease-in-out infinite; }
        .special-message { font-size: 1.4rem; color: #ffeb3b; text-align: center; margin-top: 20px; text-shadow: 0 0 10px rgba(255, 235, 59, 0.4); visibility: hidden; }
        .start-notice { position: absolute; bottom: 20px; color: rgba(255, 235, 59, 0.4); font-size: 0.9rem; }
    </style>
</head>
<body>
    <canvas id="universe"></canvas>
    
    <h1>我亲爱的大傻鸟，<br>想我的时候记得点一下这个大大的爱心</h1>
    <p>为您点亮。每一个花瓣，每一颗星尘，都承载着我的思念。</p>
    
    <div class="heart-container heart-active" id="mainHeart">
        <div class="heart"></div>
    </div>
    
    <div class="special-message" id="modelMessage">...明白，主任，正在分析思念的基址...</div>
    
    <div class="start-notice">点击即可开启语音祝福</div>
    
    <audio id="specialAudio" src="http://127.0.0.1:8000/media/yw_surprise.wav"></audio>

    <script>
        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');
        let w, h, dpr;
        let petals = [], stars = [];

        function init() {
            dpr = window.devicePixelRatio || 1;
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            ctx.scale(dpr, dpr);
            ctx.font = '20px Long Cang';
            ctx.textAlign = 'center';
            
            // 初始化星尘
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * w, y: Math.random() * h,
                    size: Math.random() * 1.5,
                    blink: Math.random() * 0.05, opacity: Math.random()
                });
            }
        }

        class Petal {
            constructor() {
                this.reset();
                this.y = Math.random() * -h; // 随机起始高度，有些更早出现
            }
            reset() {
                this.x = Math.random() * w; this.y = -50;
                this.size = Math.random() * 10 + 5;
                this.speedY = Math.random() * 1.2 + 0.8;
                this.speedX = Math.random() * 1 - 0.5;
                this.rotation = Math.random() * 360; this.rotationSpeed = (Math.random()-0.5)*2;
                this.opacity = Math.random() * 0.5 + 0.5;
                this.isSwarming = false;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.opacity; ctx.translate(this.x, this.y); ctx.rotate(this.rotation * Math.PI / 180); ctx.fillStyle = `rgba(255, 182, 193, ${this.opacity})`; ctx.beginPath();
                const d = this.size;
                ctx.moveTo(0, d/2); ctx.bezierCurveTo(-d/2, -d/2, -d, d/3, 0, d); ctx.bezierCurveTo(d, d/3, d/2, -d/2, 0, d/2);
                ctx.fill(); ctx.restore();
            }
            update() {
                if(this.isSwarming) { this.x += (Math.random()-0.5)*10; this.y -= 2; this.opacity -= 0.01; if(this.opacity <= 0) this.reset(); }
                else { this.y += this.speedY; this.x += this.speedX + Math.sin(this.y * 0.02) * 0.5; this.rotation += this.rotationSpeed; if (this.y > h + 50) this.reset(); }
            }
        }

        for (let i = 0; i < 40; i++) petals.push(new Petal());

        function animate() {
            // 营造拖尾背景
            ctx.fillStyle = 'rgba(18, 18, 18, 0.1)'; ctx.fillRect(0, 0, w, h);

            // 画闪烁的星星
            stars.forEach(s => {
                s.opacity += s.blink; if(s.opacity > 1 || s.opacity < 0) s.blink *= -1;
                ctx.fillStyle = `rgba(255, 235, 59, ${Math.max(0, s.opacity)})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
            });

            // 画花瓣
            petals.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        const heart = document.getElementById('mainHeart');
        const audio = document.getElementById('specialAudio');
        const messageBox = document.getElementById('modelMessage');

        heart.addEventListener('click', (e) => {
            // 点击散开花瓣
            petals.forEach(p => { p.isSwarming = true; setTimeout(() => p.isSwarming = false, 2000); });
            // 语音祝福
            audio.play();
            // 模型消息
            messageBox.style.visibility = 'visible';
            fetch('http://127.0.0.1:8000/dasaniao/ask', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({question: '我想听听你对 YW 的思念，要浪漫的。'})})
                .then(r => r.json()).then(d => messageBox.innerText = d.answer).catch(e => messageBox.innerText = "...明白，主任，思念 100% 溢出... 信息加密中...");
        });

        window.addEventListener('resize', init);
        init(); animate();
    </script>
</body>
</html>
