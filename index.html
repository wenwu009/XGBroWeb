<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YW的3D梦幻花海</title>
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-gold: #ffeb3b;
            --heart-red: #ff3860;
        }

        body { 
            background: radial-gradient(circle at center, #1a0a1a 0%, #050508 100%); 
            margin: 0; padding: 0; overflow: hidden; 
            display: flex; flex-direction: column; justify-content: space-between; 
            align-items: center; height: 100svh; 
            font-family: 'Long Cang', cursive; touch-action: none;
        }

        /* 3D 背景画布 */
        #renderCanvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1;
        }

        /* 标题层级 */
        .ui-layer {
            z-index: 10; text-align: center; width: 85%;
            pointer-events: none; margin-top: 15svh;
        }

        h1 {
            color: var(--text-gold);
            font-size: clamp(1.8rem, 7vw, 2.8rem);
            text-shadow: 0 0 15px rgba(255, 235, 59, 0.4);
            line-height: 1.4; margin: 0;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }

        /* 3D 脉冲爱心 */
        .heart-wrapper {
            position: relative; width: 140px; height: 140px;
            z-index: 20; display: flex; justify-content: center; align-items: center;
            margin-bottom: 20svh; cursor: pointer;
        }

        .heart {
            background-color: var(--heart-red);
            width: 70px; height: 70px;
            position: relative; transform: rotate(-45deg);
            box-shadow: 0 0 40px rgba(255, 56, 96, 0.6), inset 0 0 20px rgba(0,0,0,0.2);
            animation: pulse 1.8s ease-in-out infinite;
        }
        .heart::before, .heart::after {
            content: ''; background-color: var(--heart-red);
            width: 70px; height: 70px; border-radius: 50%; position: absolute;
        }
        .heart::before { top: -35px; left: 0; }
        .heart::after { top: 0; left: 35px; }

        @keyframes pulse {
            0% { transform: scale(1) rotate(-45deg); }
            10% { transform: scale(1.18) rotate(-45deg); }
            25% { transform: scale(1) rotate(-45deg); }
            40% { transform: scale(1.12) rotate(-45deg); }
            100% { transform: scale(1) rotate(-45deg); }
        }

        .footer {
            z-index: 10; color: rgba(255, 235, 59, 0.3);
            font-size: 0.8rem; margin-bottom: 30px; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    
    <div class="ui-layer">
        <h1>我亲爱的大傻鸟，<br>想我的时候记得点一下这个大大的爱心</h1>
    </div>
    
    <div class="heart-wrapper" id="heartBtn">
        <div class="heart"></div>
    </div>

    <div class="footer">// DESIGNED BY WENWU009 //</div>

    <script>
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, dpr;
        let petals = [];
        const petalCount = 70; // 维持流畅度的黄金数量

        function init() {
            dpr = window.devicePixelRatio || 1;
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            ctx.scale(dpr, dpr);
            
            petals = [];
            for (let i = 0; i < petalCount; i++) {
                petals.push(new Petal());
            }
        }

        class Petal {
            constructor() {
                this.reset();
                this.y = Math.random() * h; // 初始随机分布
            }

            reset() {
                this.x = Math.random() * w;
                this.y = -50;
                this.z = Math.random() * 200; // 3D 深度
                this.size = (Math.random() * 15 + 10) * (1 - this.z / 400); 
                this.speedY = Math.random() * 1.5 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 2;
                this.opacity = Math.random() * 0.5 + 0.5;
                this.swing = Math.random() * 2;
                this.swingStep = 0.01 + Math.random() * 0.02;
                
                // 物理惯性
                this.vx = 0;
                this.vy = 0;
            }

            draw() {
                ctx.save();
                const perspectiveScale = 1 - this.z / 500;
                ctx.globalAlpha = this.opacity * perspectiveScale;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                
                // 3D 旋转压缩感
                const scaleX = Math.cos(this.rotation * 0.02);
                ctx.scale(scaleX, 1);

                // 渐变色：模拟花瓣纹理和明暗
                const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                grd.addColorStop(0, '#ffc0cb');
                grd.addColorStop(1, '#ff69b4');
                
                ctx.fillStyle = grd;
                ctx.beginPath();
                // 真实花瓣形状
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size/2, -this.size/2, -this.size, this.size/3, 0, this.size);
                ctx.bezierCurveTo(this.size, this.size/3, this.size/2, -this.size/2, 0, 0);
                ctx.fill();
                
                // 边缘高光
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 0.5;
                ctx.stroke();

                ctx.restore();
            }

            update(forceX, forceY, strength) {
                // 基础下落逻辑
                this.rotation += this.rotationSpeed;
                this.swing += this.swingStep;
                
                // 物理力场反馈
                if (strength > 0) {
                    const dx = this.x - forceX;
                    const dy = this.y - forceY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 250) {
                        const push = (250 - dist) * strength * 0.05;
                        this.vx += (dx / dist) * push;
                        this.vy += (dy / dist) * push;
                    }
                }

                this.x += this.speedX + Math.sin(this.swing) * 0.5 + this.vx;
                this.y += this.speedY + this.vy;
                
                // 摩擦力衰减
                this.vx *= 0.95;
                this.vy *= 0.95;

                if (this.y > h + 50) this.reset();
            }
        }

        let pushStrength = 0;
        let touchX = 0, touchY = 0;

        function render() {
            ctx.clearRect(0, 0, w, h);
            
            // 绘制远景微光（背景氛围）
            const bgGrd = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, h);
            bgGrd.addColorStop(0, 'rgba(40, 20, 40, 0.3)');
            bgGrd.addColorStop(1, 'transparent');
            ctx.fillStyle = bgGrd;
            ctx.fillRect(0, 0, w, h);

            petals.forEach(p => {
                p.update(touchX, touchY, pushStrength);
                p.draw();
            });

            if (pushStrength > 0) pushStrength *= 0.9; // 力场衰减

            requestAnimationFrame(render);
        }

        const btn = document.getElementById('heartBtn');
        const triggerAction = (e) => {
            const pos = e.touches ? e.touches[0] : e;
            touchX = pos.clientX;
            touchY = pos.clientY;
            pushStrength = 1.2; // 爆发力
            
            // 增加瞬间心跳缩放反馈
            btn.style.transform = 'scale(0.8)';
            setTimeout(() => btn.style.transform = 'scale(1)', 150);
        };

        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            triggerAction(e);
        });
        btn.addEventListener('mousedown', triggerAction);

        window.addEventListener('resize', init);
        init();
        render();
    </script>
</body>
</html>
